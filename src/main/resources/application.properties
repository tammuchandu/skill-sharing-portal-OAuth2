spring.application.name=skill-sharing-portal

# ------------------------------
# MySQL Database (Docker / local)
# ------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# Hibernate / JPA
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------
# Server (IMPORTANT FOR RENDER)
server.port=${PORT:8080}

# REMOVE THIS (Spring Boot auto-detects it)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# FILE UPLOAD (IMPORTANT for images)
# ===============================

spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===============================
# JSP CONFIGURATION
# ===============================

spring.mvc.view.prefix=/WEB-INF/pages/
spring.mvc.view.suffix=.jsp

# ===============================
# STATIC RESOURCE CONFIGURATION
# ===============================
spring.web.resources.static-locations=classpath:/static/,file:uploads/




# Google Login
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# Facebook Login (optional)
#spring.security.oauth2.client.registration.facebook.client-id=YOUR_FB_ID
#spring.security.oauth2.client.registration.facebook.client-secret=YOUR_FB_SECRET
#spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# ===============================
# SERVER
# ===============================

#server.port=8080

# Enable debug logging for Spring Security
logging.level.org.springframework.security=DEBUG